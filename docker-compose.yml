# Полный стек одной командой: docker compose up --build → http://localhost:8080
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: payments
      DB_USERNAME: payments
      DB_PASSWORD: secret

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    depends_on:
      - app
    ports:
      - "8080:80"

volumes:
  dbdata:
